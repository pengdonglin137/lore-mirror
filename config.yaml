mirror:
  base_url: "https://lore.kernel.org"
  # Relative paths are resolved from project root
  repos_dir: "repos"
  # Max concurrent git clone/fetch operations
  max_concurrent_downloads: 2
  # Retry count for failed downloads
  max_retries: 3
  # Timeout per git operation (seconds)
  git_timeout: 3600

database:
  # Directory for per-inbox SQLite databases
  # Each inbox gets its own file: {dir}/{inbox_name}.db
  dir: "db"

sync:
  # cron expression: default every 6 hours
  schedule: "0 */6 * * *"

# ============================================================
# Inboxes to mirror
# Uncomment the ones you want to enable.
# Full list from lore.kernel.org (as of 2026-03-05, ~200 inboxes)
# ============================================================

inboxes:
  # ── Currently enabled ──────────────────────────────
  - name: lkml
    description: >-
      The Linux Kernel Mailing List — the main general-purpose mailing list for Linux kernel development.
      Covers all subsystems, patch submissions, release announcements, kernel configuration, build issues,
      and cross-subsystem discussions. If unsure which list to search, start here.

  # ── Core subsystems ────────────────────────────────
  - name: netdev
    description: >-
      Linux networking stack development — TCP/IP, sockets, routing, network drivers (ethernet, wifi),
      iptables/nftables, XDP, traffic control (tc), network namespaces, netlink, and protocol implementations.
  - name: linux-mm
    description: >-
      Linux Memory Management — page allocator, slab/slub, page cache, swap, OOM killer, memory cgroups,
      hugetlb/hugepages, THP (transparent huge pages), mmap, mremap, NUMA balancing, page migration,
      compaction, KSM, userfaultfd, memory hotplug, damon, and vm statistics.
  - name: linux-fsdevel
    description: >-
      Linux VFS and filesystem development — virtual filesystem layer, namei/path lookup, inode/dentry cache,
      mount API, file locking (flock/fcntl), splice/sendfile, io_uring FS ops, iomap, direct I/O, writeback,
      and generic filesystem infrastructure shared by all filesystems.
  - name: linux-block
    description: >-
      Linux block layer — block I/O scheduler (mq-deadline, bfq, kyber), bio/request processing,
      blk-mq multi-queue, block device drivers, partitions, loop devices, NBD, block cgroup (blkcg),
      and I/O accounting. Also covers zoned block devices and block integrity.
